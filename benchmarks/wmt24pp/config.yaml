config_paths:
  - resources_servers/wmt_translation/configs/wmt_translation.yaml

wmt24pp_wmt_translation_resources_server:
  _inherit_from: wmt_translation

wmt24pp_wmt_translation_simple_agent:
  _inherit_from: wmt_translation_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: wmt24pp_wmt_translation_resources_server
      datasets:
      - name: wmt24pp
        type: benchmark
        jsonl_fpath: benchmarks/wmt24pp/data/wmt24pp_benchmark.jsonl
        prompt_config: benchmarks/wmt24pp/prompts/default.yaml
        prepare_script: benchmarks/wmt24pp/prepare.py
        license: Creative Commons Attribution-ShareAlike 4.0 International
