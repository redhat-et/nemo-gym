config_paths:
  - resources_servers/wmt_translation/configs/wmt_translation.yaml

flores200_wmt_translation_resources_server:
  _inherit_from: wmt_translation

flores200_wmt_translation_simple_agent:
  _inherit_from: wmt_translation_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: flores200_wmt_translation_resources_server
      datasets:
