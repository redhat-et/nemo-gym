# Chain to existing resource server + agent config
config_paths:
  - resources_servers/math_with_judge/configs/math_with_judge.yaml

# Isolated benchmark-specific inheritance.
hendrycks_math_math_with_judge_resources_server:
  _inherit_from: math_with_judge

hendrycks_math_math_with_judge_simple_agent:
  _inherit_from: math_with_judge_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: hendrycks_math_math_with_judge_resources_server
      datasets:
      - name: hendrycks_math
        type: benchmark
        jsonl_fpath: benchmarks/hendrycks_math/data/hendrycks_math_benchmark.jsonl
        prompt_config: benchmarks/prompts/generic_math.yaml
        prepare_script: benchmarks/hendrycks_math/prepare.py
