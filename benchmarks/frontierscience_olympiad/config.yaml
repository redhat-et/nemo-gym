config_paths:
  - resources_servers/frontierscience_judge/configs/frontierscience_judge.yaml

frontierscience_olympiad_frontierscience_judge_resources_server:
  _inherit_from: frontierscience_judge

frontierscience_olympiad_frontierscience_judge_simple_agent:
  _inherit_from: frontierscience_judge_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: frontierscience_olympiad_frontierscience_judge_resources_server
      datasets:
      - name: frontierscience_olympiad
        type: benchmark
        jsonl_fpath: benchmarks/frontierscience_olympiad/data/frontierscience_olympiad_benchmark.jsonl
        prompt_config: benchmarks/frontierscience_olympiad/prompts/default.yaml
        prepare_script: benchmarks/frontierscience_olympiad/prepare.py
        license: Apache 2.0
