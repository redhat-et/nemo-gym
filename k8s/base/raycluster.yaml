apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: gym-ray
  namespace: gym
  labels:
    app.kubernetes.io/part-of: nemo-gym
    app.kubernetes.io/managed-by: kustomize
spec:
  rayVersion: "2.55.1"
  headGroupSpec:
    rayStartParams:
      dashboard-host: "0.0.0.0"
      num-cpus: "0"
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: nemo-gym
      spec:
        serviceAccountName: gym-sa
        terminationGracePeriodSeconds: 60
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        containers:
          - name: ray-head
            image: ghcr.io/nvidia-nemo/gym/nemo-gym-resources:latest
            imagePullPolicy: IfNotPresent
            ports:
              - containerPort: 6379
                name: gcs
                protocol: TCP
              - containerPort: 8265
                name: dashboard
                protocol: TCP
              - containerPort: 10001
                name: client
                protocol: TCP
            env:
              - name: RAY_TMPDIR
                value: /tmp
              - name: NVIDIA_VISIBLE_DEVICES
                value: void
            resources:
              requests:
                cpu: "500m"
                memory: 2Gi
              limits:
                memory: 8Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            volumeMounts:
              - mountPath: /tmp
                name: ray-tmp
        volumes:
          - name: ray-tmp
            emptyDir:
              sizeLimit: 4Gi
  workerGroupSpecs:
    - groupName: gym-workers
      replicas: 1
      minReplicas: 1
      maxReplicas: 4
      rayStartParams:
        num-cpus: "2"
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: nemo-gym
        spec:
          serviceAccountName: gym-sa
          terminationGracePeriodSeconds: 60
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ray-worker
              image: ghcr.io/nvidia-nemo/gym/nemo-gym-resources:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: RAY_TMPDIR
                  value: /tmp
                - name: NVIDIA_VISIBLE_DEVICES
                  value: void
              resources:
                requests:
                  cpu: "500m"
                  memory: 512Mi
                limits:
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - mountPath: /tmp
                  name: ray-tmp
          volumes:
            - name: ray-tmp
              emptyDir:
                sizeLimit: 4Gi
    - groupName: gym-resources
      replicas: 1
      minReplicas: 1
      maxReplicas: 1
      rayStartParams:
        num-cpus: "0"
      template:
        metadata:
          labels:
            app.kubernetes.io/name: gym-resources
            app.kubernetes.io/component: resources-server
            app.kubernetes.io/part-of: nemo-gym
        spec:
          serviceAccountName: gym-sa
          terminationGracePeriodSeconds: 60
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ray-worker
              image: ghcr.io/nvidia-nemo/gym/nemo-gym-resources:latest
              imagePullPolicy: IfNotPresent
              lifecycle:
                postStart:
                  exec:
                    command:
                      - /bin/bash
                      - -c
                      - |
                        (
                          until [ -S /tmp/ray/session_latest/sockets/raylet ]; do sleep 1; done
                          sleep 3
                          cd /opt/app-root/src
                          exec $NEMO_GYM_SERVER_ENTRYPOINT >> /tmp/nemo-gym-server.log 2>&1
                        ) &
              # WARNING: Overlay JSON patches reference env vars by index.
              # Do not reorder env[0]-env[4] without updating overlays.
              # [0]=RAY_TMPDIR [1]=NVIDIA [2]=SERVER_ENTRYPOINT [3]=CONFIG_DICT [4]=CONFIG_PATH
              env:
                - name: RAY_TMPDIR
                  value: /tmp
                - name: NVIDIA_VISIBLE_DEVICES
                  value: void
                - name: NEMO_GYM_SERVER_ENTRYPOINT
                  value: "python -m http.server 9080"
                - name: NEMO_GYM_CONFIG_DICT
                  valueFrom:
                    configMapKeyRef:
                      name: gym-config
                      key: config.yaml
                - name: NEMO_GYM_CONFIG_PATH
                  value: "MUST_BE_SET_BY_OVERLAY"
                - name: RESOURCES_HOST
                  value: "0.0.0.0"
                - name: AGENT_HOST
                  value: "gym-agent-svc"
                - name: MODEL_HOST
                  value: "gym-model-svc"
                - name: PYTHONPATH
                  value: /opt/app-root/src
              envFrom:
                - secretRef:
                    name: gym-secrets
              ports:
                - containerPort: 9080
                  name: http
                  protocol: TCP
              resources:
                requests:
                  cpu: "500m"
                  memory: 512Mi
                limits:
                  memory: 2Gi
              startupProbe:
                httpGet:
                  path: /docs
                  port: 9080
                initialDelaySeconds: 30
                periodSeconds: 5
                failureThreshold: 60
              readinessProbe:
                httpGet:
                  path: /docs
                  port: 9080
                periodSeconds: 10
                failureThreshold: 3
              livenessProbe:
                httpGet:
                  path: /docs
                  port: 9080
                periodSeconds: 30
                failureThreshold: 5
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - mountPath: /tmp
                  name: ray-tmp
          volumes:
            - name: ray-tmp
              emptyDir:
                sizeLimit: 4Gi
