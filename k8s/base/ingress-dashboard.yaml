apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gym-ray-dashboard
  namespace: gym
  labels:
    app.kubernetes.io/part-of: nemo-gym
    app.kubernetes.io/managed-by: kustomize
spec:
  rules:
    - host: ray-dashboard.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gym-ray-head-svc
                port:
                  number: 8265
