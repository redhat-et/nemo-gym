apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nemo-gym-internal
  namespace: gym
  labels:
    app.kubernetes.io/part-of: nemo-gym
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: nemo-gym
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: nemo-gym
  policyTypes:
    - Ingress
