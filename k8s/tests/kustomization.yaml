apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../overlays/example-single-tool-call

configMapGenerator:
  - name: mock-model-script
    namespace: gym
    files:
      - mock_model.py

patches:
  - path: deployment-model-patch.yaml
    target:
      kind: Deployment
      name: gym-model
