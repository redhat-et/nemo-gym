apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-openshift-ingress
  namespace: gym
  labels:
    app.kubernetes.io/part-of: nemo-gym
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: nemo-gym
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-openshift-monitoring
  namespace: gym
  labels:
    app.kubernetes.io/part-of: nemo-gym
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: nemo-gym
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: monitoring
  policyTypes:
    - Ingress
